name: Fetch FANZA videos

on:
  schedule:
    # 03:10 JST
    - cron: "10 18 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Fetch mode"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - new
          - refresh
      genres:
        description: "Comma-separated genres. Empty uses app defaults."
        required: false
        default: ""
        type: string
      hitsPerGenre:
        description: "Hits per genre for new/daily fetch"
        required: false
        default: "50"
        type: string
      refreshLimit:
        description: "Existing videos to refresh"
        required: false
        default: "30"
        type: string

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Call Sample Flow FANZA fetch endpoint
        env:
          SAMPLE_FLOW_SITE_URL: ${{ secrets.SAMPLE_FLOW_SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          MODE: ${{ github.event.inputs.mode || 'daily' }}
          GENRES: ${{ github.event.inputs.genres || '' }}
          HITS_PER_GENRE: ${{ github.event.inputs.hitsPerGenre || '50' }}
          REFRESH_LIMIT: ${{ github.event.inputs.refreshLimit || '30' }}
        run: |
          set -euo pipefail

          if [ -z "${SAMPLE_FLOW_SITE_URL:-}" ]; then
            echo "::error::SAMPLE_FLOW_SITE_URL secret is empty."
            exit 1
          fi

          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_SECRET secret is empty."
            exit 1
          fi

          BASE_URL="${SAMPLE_FLOW_SITE_URL%/}"
          URL="${BASE_URL}/api/fanza/fetch?mode=${MODE}&hitsPerGenre=${HITS_PER_GENRE}&refreshLimit=${REFRESH_LIMIT}"

          if [ -n "${GENRES:-}" ]; then
            ENCODED_GENRES="$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ.get("GENRES", ""), safe=""))')"
            URL="${URL}&genres=${ENCODED_GENRES}"
          fi

          CURL_ARGS=(
            -sS
            -L
            -X POST
            "${URL}"
            -H "content-type: application/json"
            -H "x-cron-secret: ${CRON_SECRET}"
            -H "Authorization: Bearer ${CRON_SECRET}"
          )

          if [ -n "${VERCEL_AUTOMATION_BYPASS_SECRET:-}" ]; then
            CURL_ARGS+=(
              -H "x-vercel-protection-bypass: ${VERCEL_AUTOMATION_BYPASS_SECRET}"
            )
            echo "Vercel automation bypass header: enabled"
          else
            echo "Vercel automation bypass header: not set"
          fi

          echo "Calling fetch endpoint..."
          echo "URL host/path: ${BASE_URL}/api/fanza/fetch"
          echo "Mode: ${MODE}"
          echo "Hits per genre: ${HITS_PER_GENRE}"
          echo "Refresh limit: ${REFRESH_LIMIT}"

          if [ -n "${GENRES:-}" ]; then
            echo "Genres: ${GENRES}"
          else
            echo "Genres: app default"
          fi

          BODY_FILE="$(mktemp)"
          HEADER_FILE="$(mktemp)"

          HTTP_CODE="$(
            curl "${CURL_ARGS[@]}" \
              -o "${BODY_FILE}" \
              -D "${HEADER_FILE}" \
              -w "%{http_code}"
          )"

          echo "HTTP status: ${HTTP_CODE}"
          echo "Response body:"
          cat "${BODY_FILE}"
          echo

          if [ "${HTTP_CODE}" = "401" ]; then
            echo "::error::HTTP 401. If CRON_SECRET matches, this is usually Vercel Deployment Protection/Bot Protection. Add VERCEL_AUTOMATION_BYPASS_SECRET to GitHub Secrets and enable Protection Bypass for Automation in Vercel."
            echo "Response headers summary:"
            grep -Ei '^(server|x-vercel|location|content-type|www-authenticate):' "${HEADER_FILE}" || true
            exit 1
          fi

          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "::error::Fetch endpoint failed with HTTP ${HTTP_CODE}."
            echo "Response headers summary:"
            grep -Ei '^(server|x-vercel|location|content-type|www-authenticate):' "${HEADER_FILE}" || true
            exit 1
          fi

          echo "Fetch endpoint completed successfully."
